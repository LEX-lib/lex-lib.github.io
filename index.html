<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/branding_logo.svg" />
    <link rel="preconnect" href="https://lexarium-backend.fly.dev" crossorigin />
    <link rel="dns-prefetch" href="https://lexarium-backend.fly.dev" />
    <!-- LOCKED: viewport-fit=cover is required for env(safe-area-inset-*) non-zero values (CON-VIEWPORT-FIT / LT-09). Do not remove. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- PWA-01: iOS standalone polish -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wallecx" />
    <!-- Per-color-scheme theme-color (light: #002244 matches manifest.theme_color; dark: #0d1117 = --color-surface-page in .my-app-dark, base.css line 59) -->
    <meta name="theme-color" content="#002244" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />
    <!-- PWA-02: branded splash screens (NFR-IOS-SPLASH) — generated by @vite-pwa/assets-generator in Plan 37-01 -->
    <!-- iPhone 14 Pro: 390x844 logical → 1179x2556 physical @3x -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-portrait-1179x2556.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- Android/generic 360x780 → 1080x2340 physical @3x -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-portrait-1080x2340.png" media="(device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPad 768x1024 → 1536x2048 physical @2x -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-portrait-1536x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('lexarium:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('my-app-dark');
          }
        } catch (e) {
          // localStorage unavailable (private mode in some browsers); fall back to OS preference
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('my-app-dark');
          }
        }
      })();
    </script>
    <meta name="color-scheme" content="light dark" />
<title>Lexarium - Explore. Experiment. Evolve.</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
